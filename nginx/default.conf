upstream shopmind_frontend {
  server frontend:3000;
}

upstream shopmind_backend {
  server backend:8000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

server {
  listen 80;
  server_name _;

  # Security headers
  add_header X-Content-Type-Options    "nosniff"           always;
  add_header X-Frame-Options           "SAMEORIGIN"        always;
  add_header X-XSS-Protection          "1; mode=block"     always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 1024;

  # Auth endpoints — tighter rate limit + strip /api prefix
  location ~ ^/api/auth/ {
    limit_req zone=auth burst=5 nodelay;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://shopmind_backend;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SSE endpoint — disable buffering, strip /api prefix
  location /api/assistant/chat {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://shopmind_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection        "";
    proxy_buffering                    off;
    proxy_cache                        off;
    proxy_read_timeout                 300s;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Stripe webhook — no rate limit, raw body needed, strip /api prefix
  location /api/orders/webhook/stripe {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://shopmind_backend;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
  }

  # General API — strip /api prefix
  location /api/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://shopmind_backend/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Frontend (SPA — all unknown paths → index.html)
  location / {
    proxy_pass http://shopmind_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
  }
}
